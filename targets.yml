targets:
  - repo: toniomon96/hub
    sensitivity: medium
    targets:
      - prompt_id: codebase-audit
        trigger: "cron:0 9 * * 1"
      - prompt_id: pr-review-detailed
        trigger: "event:pr.opened"
        when_expr: "additions + deletions >= 300"
      - prompt_id: pr-review-tight
        trigger: "event:pr.opened"
        when_expr: "additions + deletions < 300"
