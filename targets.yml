defaults:
  branch: main
  sensitivity: medium

targets:
  - repo: Toni-Montez-Consulting/hub
    sensitivity: medium
    prompts:
      - id: codebase-audit
        trigger: "cron:0 9 * * 1"
      - id: pr-review-detailed
        trigger: "pr.opened"
        when: "additions + deletions >= 300"
      - id: pr-review-tight
        trigger: "pr.opened"
        when: "additions + deletions < 300"

  - repo: toniomon96/dse-content
    sensitivity: high
    enabled: false
    prompts:
      - id: codebase-audit
        trigger: "manual"

  - repo: Toni-Montez-Consulting/FamilyTrips
    sensitivity: medium
    enabled: false
    prompts:
      - id: codebase-audit
        trigger: "manual"

  - repo: Toni-Montez-Consulting/Omnexus
    sensitivity: medium
    enabled: false
    prompts:
      - id: codebase-audit
        trigger: "manual"

  - repo: Toni-Montez-Consulting/consulting
    sensitivity: low
    enabled: false
    prompts:
      - id: codebase-audit
        trigger: "manual"

  - repo: Toni-Montez-Consulting/engineering-playbook
    sensitivity: medium
    enabled: false
    prompts:
      - id: codebase-audit
        trigger: "manual"

  - repo: Toni-Montez-Consulting/hub-prompts
    sensitivity: medium
    enabled: false
    prompts:
      - id: codebase-audit
        trigger: "manual"

  - repo: Toni-Montez-Consulting/hub-registry
    sensitivity: medium
    enabled: false
    prompts:
      - id: codebase-audit
        trigger: "manual"

  - repo: Toni-Montez-Consulting/demario-pickleball
    branch: master
    sensitivity: high
    enabled: false
    prompts:
      - id: codebase-audit
        trigger: "manual"

